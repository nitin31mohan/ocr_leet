name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-flight if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static files as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve everything from the repo root — no build step
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
