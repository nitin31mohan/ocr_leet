<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a1a">
  <title>ocr-leet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <header>
    <h1>ocr-leet</h1>
  </header>

  <main id="app">
    <div id="cv-loading" hidden>Loading image processor…</div>

    <div id="placeholder">
      <p>Share a written solution from Boox Notes to begin.</p>
    </div>

    <div id="image-preview" hidden>
      <img id="shared-image" src="" alt="Shared handwritten page">
      <!-- DEBUG: remove before Phase 4 -->
      <button id="btn-test-grid" type="button">Test Grid Detection</button>
      <pre id="debug-grid-output" style="white-space:pre-wrap;font-size:0.8rem;background:#f4f4f4;padding:8px;margin-top:8px"></pre>
    </div>

    <div id="ocr-result" hidden>
      <div id="problem-number"></div>
      <pre id="parsed-code"></pre>
      <div id="actions">
        <button id="btn-submit" type="button">Submit to LeetCode</button>
        <button id="btn-discard" type="button">Discard</button>
      </div>
    </div>

    <div id="result-panel" hidden></div>
  </main>

  <script>
    window.opencvReady = new Promise(resolve => {
      window.Module = { onRuntimeInitialized: resolve };
    });
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.js"></script>
  <script src="js/share-target.js"></script>
  <script src="js/dot-grid.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered, scope:', reg.scope))
        .catch(err => console.error('SW registration failed:', err));
    }
  </script>
</body>
</html>
